<!doctype html>
<meta charset="utf-8" />
<title>ZIP First library demo</title>
<script src="../library/zipfirst.js"></script>
<style>
  body { font: 16px system-ui; max-width: 760px; margin: 40px auto; padding: 0 20px; }
  form { display: grid; gap: 12px; max-width: 420px; }
  label { display: grid; gap: 4px; font-weight: 600; }
  input, select { font: inherit; padding: 8px; }
  output { display: block; margin-top: 16px; }
</style>
<h1>ZIP First library demo</h1>
<p>Enter <code>94110</code>. The library fills city/state/country and focuses the street field.</p>
<form id="address">
  <label>Postal code
    <input id="postal-code" autocomplete="postal-code" name="postal_code" inputmode="numeric" placeholder="94110" />
  </label>
  <label>City
    <input autocomplete="address-level2" name="city" />
  </label>
  <label>State
    <select autocomplete="address-level1" name="state">
      <option></option>
      <option value="CA">California</option>
      <option value="NY">New York</option>
      <option value="IL">Illinois</option>
    </select>
  </label>
  <label>Country
    <select autocomplete="country" name="country">
      <option></option>
      <option value="US">United States</option>
      <option value="CA">Canada</option>
    </select>
  </label>
  <label>Street address
    <input autocomplete="address-line1" name="street" />
  </label>
</form>
<output id="status"></output>
<script>
  ZipFirst.enhance(document.querySelector("#address"), {
    onFill({ place }) {
      document.querySelector("#status").textContent = `Filled ${place.locality}, ${place.adminAreaCode}.`;
    },
    onError(error) {
      document.querySelector("#status").textContent = error.message;
    }
  });
</script>
