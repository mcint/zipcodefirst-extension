<!doctype html>
<meta charset="utf-8" />
<title>ZIP First test page</title>
<form style="max-width: 420px; margin: 40px auto; display: grid; gap: 10px; font: 16px system-ui">
  <label>Street address <input autocomplete="address-line1" name="address1" /></label>
  <label>Apartment <input autocomplete="address-line2" name="address2" /></label>
  <label>City <input autocomplete="address-level2" name="city" /></label>
  <label>State <select autocomplete="address-level1" name="state">
    <option></option><option value="CA">California</option><option value="NY">New York</option><option value="IL">Illinois</option>
  </select></label>
  <label>ZIP <input autocomplete="postal-code" name="zip" inputmode="numeric" /></label>
  <label>Country <select autocomplete="country" name="country">
    <option></option><option value="US">United States</option><option value="CA">Canada</option>
  </select></label>
</form>
